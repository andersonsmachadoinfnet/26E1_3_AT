apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufology-app
  namespace: ufology
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ufology-app
  template:
    metadata:
      labels:
        app: ufology-app
    spec:
      containers:
        - name: ufology-app
          image: andersonmachado/ufotracker:0.1
          ports:
            - containerPort: 8080
          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
